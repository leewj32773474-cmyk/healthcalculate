<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단백질 가성비 환산기 & 랭킹</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f9f9f9; }
        .container { background-color: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        h2, h3 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; font-size: 16px; font-weight: bold; border: none; padding: 15px; margin-top: 25px; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background-color: #218838; }
        #result { display: none; margin-top: 20px; padding: 15px; background-color: #e9ecef; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; color: #0056b3; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #28a745; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <div class="container">
        <h2>💪 단백질 진짜 가성비(1g당 단가) 계산기</h2>
        
        <label>제품 총 가격 (원) <input type="number" id="price" placeholder="예: 45000"></label>
        <label>총 제공량 (g) <input type="number" id="totalWeight" placeholder="예: 1000"></label>
        <label>1회 섭취량 (g) <input type="number" id="servingSize" placeholder="예: 30"></label>
        <label>1회 섭취량당 단백질 (g) <input type="number" id="proteinPerServing" placeholder="예: 24"></label>
        
        <button onclick="calculate()">가성비 계산하기 ⚡</button>
        <div id="result"></div>
    </div>

    <div class="container">
        <h3>🏆 실시간 가성비 랭킹 (단백질 1g당 가격)</h3>
        <table>
            <thead>
                <tr>
                    <th>순위</th>
                    <th>제품명</th>
                    <th>1g당 단가</th>
                </tr>
            </thead>
            <tbody id="rankingTable">
                <!-- 자바스크립트가 여기에 랭킹을 자동으로 채워 넣습니다 -->
            </tbody>
        </table>
    </div>

    <script>
        // 📌 수동으로 관리하는 랭킹 데이터 베이스 (순서 상관없이 입력하면 알아서 싼 순서대로 정렬됨)
        const rankingData = [
            { name: "마이프로틴 임팩트 웨이 (대란 기준)", pricePerGram: 18.5 },
            { name: "컴뱃 100% 웨이 프로틴", pricePerGram: 23.2 },
            { name: "옵티멈 뉴트리션(ON) 골드스탠다드", pricePerGram: 29.8 },
            { name: "신타6 아이솔레이트", pricePerGram: 32.5 },
            { name: "NS 포대유청 WPC", pricePerGram: 16.0 }
        ];

        // 📌 웹페이지가 열리자마자 랭킹 리스트를 띄워주는 기능
        window.onload = function() {
            const tbody = document.getElementById('rankingTable');
            
            // 1g당 단가가 낮은 순서(오름차순)로 자동 정렬
            rankingData.sort((a, b) => a.pricePerGram - b.pricePerGram); 
            
            let html = '';
            rankingData.forEach((item, index) => {
                html += `<tr>
                            <td><strong>${index + 1}위</strong></td>
                            <td>${item.name}</td>
                            <td>${item.pricePerGram}원</td>
                         </tr>`;
            });
            tbody.innerHTML = html;
        };

        // 📌 계산기 작동 로직
        function calculate() {
            const price = parseFloat(document.getElementById('price').value);
            const totalWeight = parseFloat(document.getElementById('totalWeight').value);
            const servingSize = parseFloat(document.getElementById('servingSize').value);
            const proteinPerServing = parseFloat(document.getElementById('proteinPerServing').value);

            // 입력값 확인
            if (!price || !totalWeight || !servingSize || !proteinPerServing) {
                alert("빈칸에 숫자를 모두 입력해주세요!");
                return;
            }

            // 진짜 가성비 계산: 총 단백질량 구하기 -> 1g당 가격 구하기
            const totalServings = totalWeight / servingSize;
            const totalProtein = totalServings * proteinPerServing;
            const pricePerProteinGram = (price / totalProtein).toFixed(1); // 소수점 첫째 자리까지

            // 결과 화면에 띄우기
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `✅ 이 제품의 <strong>순수 단백질 1g당 가격은 [ ${pricePerProteinGram}원 ]</strong> 입니다!`;
        }
    </script>
</body>
</html>
